services:
  sonarqube:
    image: sonarqube:10.4-community
    container_name: sonarqube
    hostname: sonarqube
    ports:
      - "9090:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    hostname: sonar-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Test PostgreSQL (utilisé uniquement par test-runner) ─────────────────
  test-postgres:
    image: postgres:15
    container_name: test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

  # ── Test Runner ───────────────────────────────────────────────────────────
  # Exécute pytest pour chaque service DANS Docker (chemins /usr/src/...) afin
  # que les coverage.xml générés contiennent des chemins absolus compatibles
  # avec ce que SonarQube voit (le projet est monté dans /usr/src).
  test-runner:
    image: python:3.11-slim
    container_name: test-runner
    working_dir: /usr/src
    volumes:
      - ./:/usr/src
    env_file:
      - path: .env
        required: false
    environment:
      CI: "true"
      # Surcharge des hôtes et noms de bases de données pour pointer
      # vers le postgres de test local au lieu des services de production.
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      APIGATEWAY_DATABASE_HOST: test-postgres
      APIGATEWAY_DATABASE_NAME: gateway_db
      APIGATEWAY_DATABASE_PORT: "5432"
      COLLECTION_DATABASE_HOST: test-postgres
      COLLECTION_DATABASE_NAME: collection_db
      COLLECTION_DATABASE_PORT: "5432"
      ANALYZE_DATABASE_HOST: test-postgres
      ANALYZE_DATABASE_NAME: analyze_db
      ANALYZE_DATABASE_PORT: "5432"
      CONFIGURATION_DATABASE_HOST: test-postgres
      CONFIGURATION_DATABASE_NAME: configuration_db
      CONFIGURATION_DATABASE_PORT: "5432"
    command:
      - /bin/sh
      - -c
      - |
        set -e
        pip install --quiet --upgrade pip

        echo '=== [1/4] API Gateway ==='
        pip install --quiet -r /usr/src/backend/api-gateway/requirements.txt
        (cd /usr/src/backend/api-gateway && python -m pytest) || true

        # kafka-python (api-gateway) et kafka-python-ng (autres services)
        # partagent le même namespace — supprimer kafka-python avant la suite.
        if pip show kafka-python >/dev/null 2>&1 && pip show kafka-python-ng >/dev/null 2>&1; then
          pip uninstall -y kafka-python >/dev/null 2>&1 || true
          pip install --quiet --force-reinstall kafka-python-ng >/dev/null 2>&1 || true
        fi

        echo '=== [2/4] Analyze Service ==='
        pip install --quiet -r /usr/src/backend/services/analyze/requirements.txt
        (cd /usr/src/backend/services/analyze && python -m pytest) || true

        echo '=== [3/4] Configuration Service ==='
        pip install --quiet -r /usr/src/backend/services/configuration/requirements.txt
        (cd /usr/src/backend/services/configuration && python -m pytest) || true

        echo '=== [4/4] Collection Service ==='
        pip install --quiet -r /usr/src/backend/services/collection/requirements.txt
        (cd /usr/src/backend/services/collection && python -m pytest) || true

        echo '=== Coverage générée avec succes — chemins /usr/src/... ==='
    depends_on:
      test-postgres:
        condition: service_healthy
    restart: "no"

  # ── SonarScanner ─────────────────────────────────────────────────────────
  # Lancement à la demande uniquement (ne démarre pas avec `up`).
  # Usage depuis la racine du projet :
  #   SONAR_TOKEN=sqp_xxxx docker compose -f docker-compose.sonar.yml run --rm sonar-scanner
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: sonar-scanner
    volumes:
      - ./:/usr/src
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: "${SONAR_TOKEN:?Erreur : SONAR_TOKEN manquant. Exemple: SONAR_TOKEN=sqp_xxx docker compose run --rm sonar-scanner}"
    depends_on:
      sonarqube:
        condition: service_healthy
      test-runner:
        condition: service_completed_successfully
    restart: "no"

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_postgres_data:
