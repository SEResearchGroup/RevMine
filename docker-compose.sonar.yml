services:
  sonarqube:
    image: sonarqube:10.4-community
    container_name: sonarqube
    hostname: sonarqube
    ports:
      - "9090:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    hostname: sonar-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Test PostgreSQL (utilisé uniquement par test-runner) ─────────────────
  test-postgres:
    image: postgres:15
    container_name: test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

  # ── Test Runner ───────────────────────────────────────────────────────────
  # Exécute pytest pour chaque service DANS Docker (chemins /usr/src/...) afin
  # que les coverage.xml générés contiennent des chemins absolus compatibles
  # avec ce que SonarQube voit (le projet est monté dans /usr/src).
  test-runner:
    image: python:3.11-slim
    container_name: test-runner
    working_dir: /usr/src
    volumes:
      - ./:/usr/src
    env_file:
      - path: .env
        required: false
    environment:
      CI: "true"
      SECRET_KEY: "sonar-test-secret-key"
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      FRONTEND_URL: "http://localhost:5173"
      ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      MINIO_ENDPOINT: "storage.example.invalid"
      MINIO_ACCESS_KEY: "test-access-key"
      MINIO_SECRET_KEY: "test-secret-key"
      MINIO_BUCKET_NAME: "revmine-test"
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
      OLLAMA_HOST: "http://ollama.test"
      OPENROUTER_API_KEY: "sk-test"
      USE_SQLITE_FOR_TESTS: "False"
      # Surcharge des hôtes et noms de bases de données pour pointer
      # vers le postgres de test local au lieu des services de production.
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      AUTH_DATABASE_HOST: test-postgres
      AUTH_DATABASE_NAME: postgres
      AUTH_DATABASE_PORT: "5432"
      COLLECTION_DATABASE_HOST: test-postgres
      COLLECTION_DATABASE_NAME: postgres
      COLLECTION_DATABASE_PORT: "5432"
      ANALYZE_DATABASE_HOST: test-postgres
      ANALYZE_DATABASE_NAME: postgres
      ANALYZE_DATABASE_PORT: "5432"
      CONFIGURATION_DATABASE_HOST: test-postgres
      CONFIGURATION_DATABASE_NAME: postgres
      CONFIGURATION_DATABASE_PORT: "5432"
    command:
      - /bin/sh
      - -c
      - |
        set -e
        pip install --quiet --upgrade pip

        echo '=== [1/6] API Gateway ==='
        export AUTH_SERVICE_URL=http://auth-service:8006/api/v1/auth
        export CONFIGURATION_SERVICE_URL=http://configuration-service:8001/api/v1/workspaces
        export COLLECTION_SERVICE_URL=http://collection-service:8002/api/v1/collections
        export ANALYZE_SERVICE_URL=http://analyze-service:8003/api/v1/analysis
        export LLM_SERVICE_URL=http://llm-service:8004/api/v1/llm
        export NOTIFICATION_SERVICE_URL=http://notification-service:8005/api/v1/notifications
        pip install --quiet -r /usr/src/backend/api-gateway/requirements.txt
        (cd /usr/src/backend/api-gateway && python -m pytest)

        echo '=== [2/6] Authentication Service ==='
        pip install --quiet -r /usr/src/backend/services/authentication/requirements.txt
        (cd /usr/src/backend/services/authentication && python -m pytest)

        echo '=== [3/6] Analyze Service ==='
        pip install --quiet -r /usr/src/backend/services/analyze/requirements.txt
        (cd /usr/src/backend/services/analyze && python -m pytest)

        echo '=== [4/6] Configuration Service ==='
        pip install --quiet -r /usr/src/backend/services/configuration/requirements.txt
        (cd /usr/src/backend/services/configuration && python -m pytest)

        echo '=== [5/6] Collection Service ==='
        pip install --quiet -r /usr/src/backend/services/collection/requirements.txt
        (cd /usr/src/backend/services/collection && python -m pytest)

        echo '=== [6/6] LLM Service ==='
        pip install --quiet -r /usr/src/backend/services/llm/requirements.txt
        (cd /usr/src/backend/services/llm && python -m pytest)

        echo '=== Coverage générée avec succes — chemins /usr/src/... ==='
    depends_on:
      test-postgres:
        condition: service_healthy
    restart: "no"

  # ── SonarScanner ─────────────────────────────────────────────────────────
  # Lancement à la demande uniquement (ne démarre pas avec `up`).
  # Usage depuis la racine du projet :
  #   SONAR_TOKEN=sqp_xxxx docker compose -f docker-compose.sonar.yml run --rm sonar-scanner
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: sonar-scanner
    volumes:
      - ./:/usr/src
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: "${SONAR_TOKEN}"
    depends_on:
      sonarqube:
        condition: service_healthy
      test-runner:
        condition: service_completed_successfully
    restart: "no"

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_postgres_data:
