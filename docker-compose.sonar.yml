services:
  sonarqube:
    image: sonarqube:10.4-community
    container_name: sonarqube
    hostname: sonarqube
    ports:
      - "9090:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    hostname: sonar-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── SonarScanner ─────────────────────────────────────────────────────────
  # Lancement à la demande uniquement (ne démarre pas avec `up`).
  # Usage depuis la racine du projet :
  #   SONAR_TOKEN=sqp_xxxx docker compose -f docker-compose.sonar.yml run --rm sonar-scanner
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: sonar-scanner
    volumes:
      - ./:/usr/src
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: "${SONAR_TOKEN:?Erreur : SONAR_TOKEN manquant. Exemple: SONAR_TOKEN=sqp_xxx docker compose run --rm sonar-scanner}"
    depends_on:
      sonarqube:
        condition: service_healthy
    restart: "no"

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_postgres_data:
