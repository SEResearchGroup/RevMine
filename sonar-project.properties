# ── Identification du projet ──────────────────────────────────────────────────
sonar.projectKey=revmine
sonar.projectName=RevMine - Microservices Backend
sonar.projectVersion=1.0

# ── Sources analysées ────────────────────────────────────────────────────────
sonar.sources=backend

# ── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/.venv/**,\
  **/venv/**,\
  **/media/**,\
  **/static/**,\
  backend/shared/**

# ── Répertoires de tests ──────────────────────────────────────────────────────
sonar.tests=backend
sonar.test.inclusions=\
  **/tests/**/*.py,\
  **/test_*.py,\
  **/*_test.py

# ── Rapports de couverture ────────────────────────────────────────────────────
# Les coverage.xml sont générés par le service test-runner DANS Docker
# (monté sur /usr/src) afin que les chemins absolus correspondent à ceux
# que SonarQube voit. Le glob ci-dessous récupère tous les rapports.
sonar.python.coverage.reportPaths=**/coverage.xml

# ── Langue et encodage ────────────────────────────────────────────────────────
sonar.language=py
sonar.sourceEncoding=UTF-8

# ── Serveur SonarQube ─────────────────────────────────────────────────────────
# Valeur par défaut : instance locale (docker-compose.sonar.yml, port 9090).
# Overridée automatiquement par la variable d'env SONAR_HOST_URL si définie.
# → La variable d'env SONAR_HOST_URL a toujours la priorité sur cette valeur.
sonar.host.url=http://localhost:9090

# ── Quality Gate (CI/CD) ──────────────────────────────────────────────────────
# Le scanner attend la décision de la quality gate avant de terminer.
# Code de sortie 1 si la quality gate échoue → le pipeline CI/CD échoue.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

