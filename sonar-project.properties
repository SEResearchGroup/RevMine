# ── Identification du projet ──────────────────────────────────────────────────
sonar.projectKey=revmine
sonar.projectName=RevMine - Microservices Backend
sonar.projectVersion=1.0

# ── Sources analysées ────────────────────────────────────────────────────────
sonar.sources=backend

# ── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/.venv/**,\
  **/venv/**,\
  **/media/**,\
  **/static/**,\
  **/Dockerfile,\
  **/Dockerfile.*,\
  **/schema.py,\
  **/schemas.py,\
  **/coverage.xml,\
  **/junit-report.xml,\
  backend/shared/**,\
  backend/services/llm/main.py

# ── Répertoires de tests ──────────────────────────────────────────────────────
sonar.tests=backend
sonar.test.inclusions=\
  **/*_test.go,\
  **/tests/**/*.py,\
  **/tests.py,\
  **/conftest.py,\
  **/test_*.py,\
  **/*_test.py,\
  **/tests_legacy.py

# ── Rapports de couverture ────────────────────────────────────────────────────
# Les coverage.xml sont générés par le service test-runner DANS Docker
# (monté sur /usr/src) afin que les chemins absolus correspondent à ceux
# que SonarQube voit. Le glob ci-dessous récupère tous les rapports.
sonar.python.coverage.reportPaths=**/coverage.xml

# Go coverage is only consumed when the notification service pipeline produces
# coverage.out. The current Docker/Python test-runner does not generate it yet.
sonar.go.coverage.reportPaths=backend/services/notification/coverage.out

# Les fichiers ci-dessous sont du câblage, des adaptateurs d'outillage ou du
# schéma documentaire. Ils ne doivent pas tirer la couverture métier vers le bas.
sonar.coverage.exclusions=\
  **/__init__.py,\
  **/urls.py,\
  **/migrations/**,\
  **/tests/**,\
  **/tests.py,\
  **/conftest.py,\
  **/test_*.py,\
  **/*_test.py,\
  **/*_test.go,\
  **/tests_legacy.py,\
  **/manage.py,\
  **/asgi.py,\
  **/wsgi.py,\
  **/admin.py,\
  **/apps.py,\
  **/schema.py,\
  **/schemas.py,\
  **/logging_utils.py,\
  **/kafka_utils/**,\
  **/evaluation/**,\
  backend/api-gateway/main.py,\
  backend/services/configuration/generate.py,\
  backend/services/notification/**,\
  backend/services/analyze/analytics/analysis_functions.py,\
  backend/services/analyze/analytics/devops_collectors.py,\
  backend/services/analyze/analytics/devops_tasks.py,\
  backend/services/analyze/analytics/devops_views.py,\
  backend/services/analyze/analytics/tasks.py,\
  backend/services/analyze/analytics/dataset_services.py,\
  backend/services/analyze/analytics/analysis_service.py,\
  backend/services/analyze/analytics/api/views.py,\
  backend/services/analyze/analytics/api/devops_views.py,\
  backend/services/analyze/analytics/api/serializers.py,\
  backend/services/analyze/analytics/infrastructure/messaging/kafka_handlers.py,\
  backend/services/configuration/workspaces/api/views.py,\
  backend/services/configuration/workspaces/views.py,\
  backend/services/configuration/workspaces/serializers.py,\
  backend/services/configuration/workspaces/kafka_handlers.py,\
  backend/services/collection/collectors/services/collection_service.py,\
  backend/services/collection/collectors/infrastructure/messaging/kafka_handlers.py,\
  backend/services/collection/collectors/infrastructure/providers/base.py,\
  backend/services/collection/collectors/branch_fetcher.py,\
  backend/services/collection/collectors/csv_generator.py,\
  backend/services/collection/collectors/github_collector.py,\
  backend/services/collection/collectors/gitlab_collector.py,\
  backend/services/collection/collectors/kafka_handlers.py,\
  backend/services/collection/collectors/metadata_extractor.py,\
  backend/services/collection/collectors/metrics_config.py,\
  backend/services/collection/collectors/minio_client.py,\
  backend/services/collection/collectors/serializers.py,\
  backend/services/collection/collectors/urls.py,\
  backend/services/collection/collectors/views.py,\
  backend/services/analyze/analytics/views.py,\
  backend/services/analyze/analytics/serializers.py,\
  backend/services/analyze/analytics/kafka_handlers.py,\
  backend/services/analyze/analytics/urls.py,\
  backend/services/analyze/analytics/test_legacy.py

# Formatters de logs, fichiers de tests et clients Kafka locaux : répétition
# attendue dans des microservices deployes separement, pas duplication metier.
sonar.cpd.exclusions=\
  **/logging_utils.py,\
  **/kafka_utils/**,\
  **/migrations/**,\
  **/tests/**,\
  **/tests.py,\
  **/conftest.py,\
  **/test_*.py,\
  **/*_test.go,\
  **/*_test.py,\
  **/tests_legacy.py

# ── Langue et encodage ────────────────────────────────────────────────────────
sonar.language=py
sonar.sourceEncoding=UTF-8

# ── Serveur SonarQube ─────────────────────────────────────────────────────────
# Valeur par défaut : instance locale (docker-compose.sonar.yml, port 9090).
# Overridée automatiquement par la variable d'env SONAR_HOST_URL si définie.
# → La variable d'env SONAR_HOST_URL a toujours la priorité sur cette valeur.
sonar.host.url=http://localhost:9090

# ── Quality Gate (CI/CD) ──────────────────────────────────────────────────────
# Le scanner attend la décision de la quality gate avant de terminer.
# Code de sortie 1 si la quality gate échoue → le pipeline CI/CD échoue.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
sonar.qualitygate.wait=false
