# ══════════════════════════════════════════════════════════════════════════════
#  RevMine — Pipeline CI/CD GitLab
# ══════════════════════════════════════════════════════════════════════════════
#
#  Stages :
#    1. test    → un job par service, déclenché par rules:changes
#    2. quality → analyse SonarQube (quality gate bloquante)
#    3. build   → image Docker du service modifié
#
#  Exemples :
#    - backend/services/collection/**      → test:collection + build:collection
#    - backend/services/analyze/**         → test:analyze + build:analyze
#    - backend/services/configuration/**   → test:configuration + build:configuration
#    - backend/api-gateway/**              → test:api-gateway + build:api-gateway
#    - backend/services/notification/**    → test:notification + build:notification
#    - .gitlab-ci.yml ou scripts/ci/**     → tous les jobs de test/build impactés
#
#  Variables CI/CD requises (GitLab > Settings > CI/CD > Variables) :
#    SONAR_TOKEN    — token SonarQube (ex: sqp_xxx)   [masquée]
#    SONAR_HOST_URL — URL du serveur SonarQube accessible par le runner
#
#  Ne jamais stocker de token SonarQube dans ce fichier.
# ══════════════════════════════════════════════════════════════════════════════

stages:
  - test
  - quality
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

default:
  interruptible: true

cache:
  key: "pip-$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 1 — TEST
# ══════════════════════════════════════════════════════════════════════════════
.python_test: &python_test
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev postgresql-client
    - until pg_isready -h postgres -U postgres; do echo "waiting..."; sleep 1; done
    - PGPASSWORD=postgres createdb -h postgres -U postgres gateway_db || true
    - PGPASSWORD=postgres createdb -h postgres -U postgres analyze_db || true
    - PGPASSWORD=postgres createdb -h postgres -U postgres configuration_db || true
    - PGPASSWORD=postgres createdb -h postgres -U postgres collection_db || true
    - python -m pip install --quiet --upgrade pip
  script:
    - bash scripts/ci/test_python_service.sh "$SERVICE_DIR"
  artifacts:
    when: always
    reports:
      junit:
        - $SERVICE_DIR/junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: $SERVICE_DIR/coverage.xml
    paths:
      - $SERVICE_DIR/coverage.xml
      - $SERVICE_DIR/junit-report.xml
    expire_in: 1 week
  allow_failure: false

test:api-gateway:
  <<: *python_test
  variables:
    SERVICE_DIR: backend/api-gateway
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/api-gateway/**/*
        - backend/shared/**/*

test:authentication:
  <<: *python_test
  variables:
    SERVICE_DIR: backend/services/authentication
    USE_SQLITE_FOR_TESTS: "True"
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/services/authentication/**/*
        - backend/shared/**/*
        - infrastructure/keycloak/**/*

test:analyze:
  <<: *python_test
  variables:
    SERVICE_DIR: backend/services/analyze
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/services/analyze/**/*
        - backend/shared/**/*

test:configuration:
  <<: *python_test
  variables:
    SERVICE_DIR: backend/services/configuration
    USE_SQLITE_FOR_TESTS: "True"
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/services/configuration/**/*
        - backend/shared/**/*

test:collection:
  <<: *python_test
  variables:
    SERVICE_DIR: backend/services/collection
    USE_SQLITE_FOR_TESTS: "True"
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/services/collection/**/*
        - backend/shared/**/*

test:llm:
  <<: *python_test
  variables:
    SERVICE_DIR: backend/services/llm
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/services/llm/**/*
        - backend/shared/**/*

test:notification:
  stage: test
  image: golang:1.22
  variables:
    GOCACHE: /tmp/go-cache
    GOPATH: /tmp/go
  script:
    - bash scripts/ci/test_notification_service.sh
  artifacts:
    when: always
    paths:
      - backend/services/notification/coverage.out
    expire_in: 1 week
  rules:
    - changes:
        - .gitlab-ci.yml
        - scripts/ci/**/*
        - docker-compose*.yml
        - backend/services/notification/**/*

