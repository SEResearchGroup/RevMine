# ══════════════════════════════════════════════════════════════════════════════
#  RevMine — Pipeline CI/CD GitLab
# ══════════════════════════════════════════════════════════════════════════════
#
#  Stages :
#    1. test    → run_tests.sh (tous les services, un seul job)
#    2. quality → analyse SonarQube (quality gate bloquante)
#    3. build   → images Docker (uniquement sur main/master)
#
#  Variables CI/CD requises (GitLab > Settings > CI/CD > Variables) :
#    SONAR_TOKEN    — token SonarQube (ex: sqp_xxx)   [masquée]
#    SONAR_HOST_URL — URL du serveur SonarQube accessible par le runner
#
#  Ne jamais stocker de token SonarQube dans ce fichier.
# ══════════════════════════════════════════════════════════════════════════════

stages:
  - test
  - quality
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

default:
  interruptible: true

cache:
  key: "pip-$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 1 — TEST
# ══════════════════════════════════════════════════════════════════════════════
test:all:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev postgresql-client
    - until pg_isready -h postgres -U postgres; do echo "waiting..."; sleep 1; done
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE gateway_db;" postgres
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE analyze_db;" postgres
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE configuration_db;" postgres
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE collection_db;" postgres
    - printf 'SECRET_KEY=ci-gw\nDEBUG=True\nALLOWED_HOSTS=localhost,127.0.0.1\nDATABASE_NAME=gateway_db\nDATABASE_USER=postgres\nDATABASE_PASSWORD=postgres\nDATABASE_HOST=postgres\nDATABASE_PORT=5432\nCONFIGURATION_SERVICE_URL=http://localhost:8001/api/workspaces\nLLM_SERVICE_URL=http://localhost:8004\nCOLLECTION_SERVICE_URL=http://localhost:8002/api/collections\nGITHUB_CLIENT_ID=ci\nGITHUB_CLIENT_SECRET=ci\nGITHUB_REDIRECT_URI=http://localhost:5173/auth/github/callback\nGITLAB_CLIENT_ID=ci\nGITLAB_CLIENT_SECRET=ci\nGITLAB_REDIRECT_URI=http://localhost:5173/auth/gitlab/callback\nGOOGLE_CLIENT_ID=ci\nGOOGLE_CLIENT_SECRET=ci\nGOOGLE_REDIRECT_URI=http://localhost:5173/auth/google/callback\nFRONTEND_URL=http://localhost:5173\n' > backend/api-gateway/.env
    - printf 'SECRET_KEY=ci-analyze\nDEBUG=True\nALLOWED_HOSTS=localhost,127.0.0.1\nDATABASE_NAME=analyze_db\nDATABASE_USER=postgres\nDATABASE_PASSWORD=postgres\nDATABASE_HOST=postgres\nDATABASE_PORT=5432\nCELERY_BROKER_URL=memory://\nCELERY_RESULT_BACKEND=cache+memory://\nKAFKA_BOOTSTRAP_SERVERS=localhost:9092\nMINIO_ENDPOINT=localhost:9000\nMINIO_ACCESS_KEY=minioadmin\nMINIO_SECRET_KEY=minioadmin\nMINIO_BUCKET_NAME=revmine-analyze\n' > backend/services/analyze/.env
    - printf 'SECRET_KEY=ci-config\nDEBUG=True\nALLOWED_HOSTS=localhost,127.0.0.1\nDATABASE_NAME=configuration_db\nDATABASE_USER=postgres\nDATABASE_PASSWORD=postgres\nDATABASE_HOST=postgres\nDATABASE_PORT=5432\nKAFKA_BOOTSTRAP_SERVERS=localhost:9092\nENCRYPTION_KEY=dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcy10ZXN0\nJWT_SECRET_KEY=ci-jwt\nMINIO_ENDPOINT=localhost:9000\nMINIO_ACCESS_KEY=minioadmin\nMINIO_SECRET_KEY=minioadmin\n' > backend/services/configuration/.env
    - printf 'SECRET_KEY=ci-collection\nDEBUG=True\nALLOWED_HOSTS=localhost,127.0.0.1\nDATABASE_NAME=collection_db\nDATABASE_USER=postgres\nDATABASE_PASSWORD=postgres\nDATABASE_HOST=postgres\nDATABASE_PORT=5432\nKAFKA_BOOTSTRAP_SERVERS=localhost:9092\nMINIO_ENDPOINT=localhost:9000\nMINIO_ACCESS_KEY=minioadmin\nMINIO_SECRET_KEY=minioadmin\nMINIO_BUCKET_NAME=revmine-collections\n' > backend/services/collection/.env
  script:
    - bash run_tests.sh
  artifacts:
    when: always
    reports:
      junit:
        - backend/api-gateway/junit-report.xml
        - backend/services/analyze/junit-report.xml
        - backend/services/configuration/junit-report.xml
        - backend/services/collection/junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/api-gateway/coverage.xml
    paths:
      - backend/api-gateway/coverage.xml
      - backend/api-gateway/junit-report.xml
      - backend/services/analyze/coverage.xml
      - backend/services/analyze/junit-report.xml
      - backend/services/configuration/coverage.xml
      - backend/services/configuration/junit-report.xml
      - backend/services/collection/coverage.xml
      - backend/services/collection/junit-report.xml
    expire_in: 1 week
  allow_failure: false

