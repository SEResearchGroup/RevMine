stages:
  - lint
  - test
  - build

variables:
  LLM_SERVICE_DIR: "backend/services/llm"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/llm-service"

default:
  interruptible: true

cache:
  paths:
    - .cache/pip
    - .cache/pre-commit

workflow:
  rules:
    - changes:
        - backend/services/llm/**/*
        - .gitlab-ci.yml
    - when: never

precommit-llm:
  stage: lint
  image: python:3.11-slim
  rules:
    - changes:
        - backend/services/llm/**/*
        - .gitlab-ci.yml
  before_script:
    - cd "$LLM_SERVICE_DIR"
    - python -V
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pre-commit run --all-files
  artifacts:
    when: always
    expire_in: 1 week

test-llm:
  stage: test
  image: python:3.11-slim
  rules:
    - changes:
        - backend/services/llm/**/*
        - .gitlab-ci.yml
  before_script:
    - cd "$LLM_SERVICE_DIR"
    - python -V
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pytest
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/services/llm/coverage.xml
    paths:
      - backend/services/llm/coverage.xml
    expire_in: 1 week

build-llm-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - changes:
        - backend/services/llm/**/*
        - .gitlab-ci.yml
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHA" "$LLM_SERVICE_DIR"
    - docker tag "$IMAGE_NAME:$CI_COMMIT_SHA" "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHA"
    - docker push "$IMAGE_NAME:latest"
