# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 3 — BUILD (optionnel, uniquement sur main/master)
# ══════════════════════════════════════════════════════════════════════════════
.build_docker: &build_docker
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
  allow_failure: false

build:api-gateway:
  <<: *build_docker
  script:
    - docker build -t revmine/api-gateway:$CI_COMMIT_SHORT_SHA backend/api-gateway/

build:analyze:
  <<: *build_docker
  script:
    - docker build -t revmine/analyze:$CI_COMMIT_SHORT_SHA backend/services/analyze/

build:configuration:
  <<: *build_docker
  script:
    - docker build -t revmine/configuration:$CI_COMMIT_SHORT_SHA backend/services/configuration/

build:collection:
  <<: *build_docker
  script:
    - docker build -t revmine/collection:$CI_COMMIT_SHORT_SHA backend/services/collection/
