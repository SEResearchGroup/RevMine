# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 3 — BUILD (optionnel, uniquement sur main/master)
# ══════════════════════════════════════════════════════════════════════════════
.build_docker: &build_docker
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  allow_failure: false

build:api-gateway:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/api-gateway/**/*
        - backend/shared/**/*
  script:
    - docker build -t revmine/api-gateway:$CI_COMMIT_SHORT_SHA backend/api-gateway/

build:authentication:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/services/authentication/**/*
        - backend/shared/**/*
        - infrastructure/keycloak/**/*
  script:
    - docker build -t revmine/authentication:$CI_COMMIT_SHORT_SHA backend/services/authentication/

build:analyze:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/services/analyze/**/*
        - backend/shared/**/*
  script:
    - docker build -t revmine/analyze:$CI_COMMIT_SHORT_SHA backend/services/analyze/

build:configuration:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/services/configuration/**/*
        - backend/shared/**/*
  script:
    - docker build -t revmine/configuration:$CI_COMMIT_SHORT_SHA backend/services/configuration/

build:collection:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/services/collection/**/*
        - backend/shared/**/*
  script:
    - docker build -t revmine/collection:$CI_COMMIT_SHORT_SHA backend/services/collection/

build:llm:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/services/llm/**/*
        - backend/shared/**/*
  script:
    - docker build -t revmine/llm:$CI_COMMIT_SHORT_SHA backend/services/llm/

build:notification:
  <<: *build_docker
  rules:
    - changes:
        - .gitlab-ci.yml
        - docker-compose*.yml
        - backend/services/notification/**/*
  script:
    - docker build -t revmine/notification:$CI_COMMIT_SHORT_SHA backend/services/notification/
