# ══════════════════════════════════════════════════════════════════════════════
#  RevMine — Pipeline CI/CD GitLab
# ══════════════════════════════════════════════════════════════════════════════
#
#  Stages :
#    1. test    → run_tests.sh (tous les services, un seul job)
#    2. quality → analyse SonarQube (quality gate bloquante)
#    3. build   → images Docker (uniquement sur main/master)
#
#  Variables CI/CD requises (GitLab > Settings > CI/CD > Variables) :
#    SONAR_TOKEN    — token SonarQube (ex: sqp_xxx)   [masquée]
#    SONAR_HOST_URL — URL du serveur SonarQube accessible par le runner
#
#  Ne jamais stocker de token SonarQube dans ce fichier.
# ══════════════════════════════════════════════════════════════════════════════

stages:
  - test
  - quality
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

default:
  interruptible: true

cache:
  key: "pip-$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 1 — TEST
# ══════════════════════════════════════════════════════════════════════════════
test:all:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev postgresql-client
    - until pg_isready -h postgres -U postgres; do echo "waiting..."; sleep 1; done
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE gateway_db;" postgres
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE analyze_db;" postgres
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE configuration_db;" postgres
    - PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE collection_db;" postgres
    - |
      printf '%s\n' \
        'SECRET_KEY=ci-secret-key-not-for-production' \
        'DEBUG=True' \
        'ALLOWED_HOSTS=localhost,127.0.0.1' \
        'CORS_ALLOWED_ORIGINS=http://localhost:5173' \
        'FRONTEND_URL=http://localhost:5173' \
        'DATABASE_USER=postgres' \
        'DATABASE_PASSWORD=postgres' \
        'APIGATEWAY_DATABASE_NAME=gateway_db' \
        'APIGATEWAY_DATABASE_HOST=postgres' \
        'APIGATEWAY_DATABASE_PORT=5432' \
        'ANALYZE_DATABASE_NAME=analyze_db' \
        'ANALYZE_DATABASE_HOST=postgres' \
        'ANALYZE_DATABASE_PORT=5432' \
        'CONFIGURATION_DATABASE_NAME=configuration_db' \
        'CONFIGURATION_DATABASE_HOST=postgres' \
        'CONFIGURATION_DATABASE_PORT=5432' \
        'COLLECTION_DATABASE_NAME=collection_db' \
        'COLLECTION_DATABASE_HOST=postgres' \
        'COLLECTION_DATABASE_PORT=5432' \
        'CELERY_BROKER_URL=memory://' \
        'CELERY_RESULT_BACKEND=cache+memory://' \
        'KAFKA_BOOTSTRAP_SERVERS=localhost:9092' \
        'ENCRYPTION_KEY=nk1hNYEsLfbfxri5VX7PG6p_le60MEDyom1TXLlcWpY=' \
        'MINIO_ENDPOINT=localhost:9000' \
        'MINIO_ACCESS_KEY=minioadmin' \
        'MINIO_SECRET_KEY=minioadmin' \
        'MINIO_BUCKET_NAME=revmine-collections' \
        'MINIO_SECURE=False' \
        'GITHUB_CLIENT_ID=ci' \
        'GITHUB_CLIENT_SECRET=ci' \
        'GITHUB_REDIRECT_URI=http://localhost:5173/auth/github/callback' \
        'GITLAB_CLIENT_ID=ci' \
        'GITLAB_CLIENT_SECRET=ci' \
        'GITLAB_REDIRECT_URI=http://localhost:5173/auth/gitlab/callback' \
        'GOOGLE_CLIENT_ID=ci' \
        'GOOGLE_CLIENT_SECRET=ci' \
        'GOOGLE_REDIRECT_URI=http://localhost:5173/auth/google/callback' \
        > .env
  script:
    - bash run_tests.sh
  artifacts:
    when: always
    reports:
      junit:
        - backend/api-gateway/junit-report.xml
        - backend/services/analyze/junit-report.xml
        - backend/services/configuration/junit-report.xml
        - backend/services/collection/junit-report.xml
        - backend/services/llm/junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/api-gateway/coverage.xml
    paths:
      - backend/api-gateway/coverage.xml
      - backend/api-gateway/junit-report.xml
      - backend/services/analyze/coverage.xml
      - backend/services/analyze/junit-report.xml
      - backend/services/configuration/coverage.xml
      - backend/services/configuration/junit-report.xml
      - backend/services/collection/coverage.xml
      - backend/services/collection/junit-report.xml
      - backend/services/llm/coverage.xml
      - backend/services/llm/junit-report.xml
    expire_in: 1 week
  allow_failure: false

