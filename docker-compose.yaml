version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]  
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api-gateway:
    build:
      context: ./backend/api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ./backend/api-gateway/.env
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: app_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/api-gateway:/app
    networks:
      - app-network
    command: sh -c "sleep 5 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  configuration-service:
    build:
      context: ./backend/services/configuration
    ports:
      - "8001:8001"
    env_file:
      - ./backend/services/configuration/.env
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: app_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      api-gateway:
        condition: service_started  
    volumes:
      - ./backend/services/configuration:/app
    networks:
      - app-network
    command: sh -c "sleep 15 && python manage.py migrate --run-syncdb && python manage.py runserver 0.0.0.0:8001"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge