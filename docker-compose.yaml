x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - app-network

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    hostname: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./infrastructure/docker/logging/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks:
      - app-network

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    hostname: promtail
    ports:
      - "9080:9080"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infrastructure/docker/logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging
    networks:
      - app-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/logging/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ./.env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-network

  gateway-db:
    image: postgres:15
    container_name: gateway-db
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - gateway_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - app-network

  configuration-db:
    image: postgres:15
    container_name: configuration-db
    environment:
      POSTGRES_DB: configuration_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - configuration_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - app-network

  collection-db:
    image: postgres:15
    container_name: collection-db
    environment:
      POSTGRES_DB: collection_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - collection_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - app-network

  analyze-db:
    image: postgres:15
    container_name: analyze-db
    environment:
      POSTGRES_DB: analyze_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - analyze_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - app-network

  notification-db:
    image: postgres:15
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5436:5432"
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - app-network

  ollama-service:
    image: ollama/ollama:latest
    container_name: ollama-service
    hostname: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging

  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: api-gateway
    hostname: api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      APIGATEWAY_DATABASE_HOST: gateway-db
      APIGATEWAY_DATABASE_NAME: gateway_db
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APIGATEWAY_DATABASE_PORT: 5432
      CONFIGURATION_SERVICE_URL: http://configuration-service:8001/api/workspaces
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_SERVICE_URL: http://llm-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
    depends_on:
      gateway-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      llm-service:
        condition: service_started
    volumes:
      - ./backend/api-gateway:/app
    networks:
      - app-network
    command: sh -c "sleep 5 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    logging: *default-logging

  configuration-service:
    build:
      context: ./backend/services/configuration
    container_name: configuration-service
    hostname: configuration-service
    ports:
      - "8001:8001"
    env_file:
      - ./.env
    environment:
      CONFIGURATION_DATABASE_HOST: configuration-db
      CONFIGURATION_DATABASE_NAME: configuration_db
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CONFIGURATION_DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      configuration-db:
        condition: service_healthy
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/services/configuration:/app
    networks:
      - app-network
    command: sh -c "sleep 10 && python manage.py migrate --run-syncdb && python manage.py runserver 0.0.0.0:8001"
    restart: unless-stopped
    logging: *default-logging

  collection-service:
    build:
      context: ./backend/services/collection
    container_name: collection-service
    hostname: collection-service
    ports:
      - "8002:8002"
    env_file:
      - ./.env
    environment:
      COLLECTION_DATABASE_HOST: collection-db
      COLLECTION_DATABASE_NAME: collection_db
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      COLLECTION_DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_SERVICE_URL: http://llm-service:8004
    depends_on:
      collection-db:
        condition: service_healthy
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy
      llm-service:
        condition: service_started
    volumes:
      - ./backend/services/collection:/app
    networks:
      - app-network
    command: sh -c "sleep 10 && python manage.py migrate --run-syncdb && python manage.py runserver 0.0.0.0:8002"
    restart: unless-stopped
    logging: *default-logging

  analyze-service:
    build:
      context: ./backend/services/analyze
    container_name: analyze-service
    hostname: analyze-service
    ports:
      - "8003:8003"
    env_file:
      - ./.env
    environment:
      ANALYZE_DATABASE_HOST: analyze-db
      ANALYZE_DATABASE_NAME: analyze_db
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ANALYZE_DATABASE_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_SERVICE_URL: http://llm-service:8004
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      analyze-db:
        condition: service_healthy
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy
      llm-service:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend/services/analyze:/app
    networks:
      - app-network
    command: sh -c "sleep 10 && python manage.py migrate --run-syncdb && python manage.py runserver 0.0.0.0:8003"
    restart: unless-stopped
    logging: *default-logging

  celery-worker:
    build:
      context: ./backend/services/analyze
    container_name: celery-worker
    hostname: celery-worker
    env_file:
      - ./.env
    environment:
      ANALYZE_DATABASE_HOST: analyze-db
      ANALYZE_DATABASE_NAME: analyze_db
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ANALYZE_DATABASE_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      analyze-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/services/analyze:/app
    networks:
      - app-network
    command: celery -A analyze_service worker --loglevel=info
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    logging: *default-logging

  llm-service:
    build:
      context: ./backend/services/llm
    container_name: llm-service
    hostname: llm-service
    ports:
      - "8004:8004"
    env_file:
      - ./.env
    environment:
      OLLAMA_HOST: http://ollama-service:11434
    depends_on:
      - ollama-service
    volumes:
      - ./backend/services/llm:/app
    networks:
      - app-network
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    restart: unless-stopped
    logging: *default-logging

  notification-service:
    build:
      context: ./backend/services/notification
    container_name: notification-service
    hostname: notification-service
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@notification-db:5432/notification_db?sslmode=disable"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_GROUP_ID: "notification-service"
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    hostname: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api-gateway:
        condition: service_started
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging

volumes:
  kafka_data:
  gateway_postgres_data:
  configuration_postgres_data:
  collection_postgres_data:
  analyze_postgres_data:
  notification_postgres_data:
  loki_data:
  grafana_data:
  redis_data:
  minio_data:
  ollama_data:
  frontend_node_modules:

networks:
  app-network:
    driver: bridge
    name: revmine-network
